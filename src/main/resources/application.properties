spring.application.name=israel-student-union

# 1. \uD55C\uAE00 \uAE68\uC9D0 \uBC29\uC9C0 (\uD544\uC218)
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true
spring.servlet.encoding.enabled=true

# \u2605 \uB370\uC774\uD130 \uBCF4\uC874 \uC124\uC815

# 2. DB \uD30C\uC77C \uC800\uC7A5 \uBAA8\uB4DC (\uD30C\uC77C\uB85C \uC800\uC7A5\uD558\uC5EC \uB370\uC774\uD130 \uC720\uC9C0)
# ./db/iksu_db \uD30C\uC77C\uC774 \uD504\uB85C\uC81D\uD2B8 \uD3F4\uB354\uC5D0 \uC0DD\uC131\uB429\uB2C8\uB2E4.
# spring.datasource.url=jdbc:h2:file:./db/iksu_db;AUTO_SERVER=TRUE;MODE=MySQL
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# 3. JPA \uC124\uC815 (update = \uAE30\uC874 \uB370\uC774\uD130 \uC720\uC9C0\uD558\uACE0 \uC2A4\uD0A4\uB9C8\uB9CC \uBCC0\uACBD)
# \uAE30\uC874: create (\uB9E4\uBC88 \uC0AD\uC81C \uD6C4 \uB2E4\uC2DC \uC0DD\uC131) -> \uBCC0\uACBD: update (\uC720\uC9C0)
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.show_sql=false
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ==========================================

# 4. H2 \uCF58\uC194 \uC0AC\uC6A9 (http://localhost:8080/h2-console)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.h2.console.settings.web-allow-others=true


# ------------------------------------------
# [\uC218\uC815\uB41C \uBD80\uBD84] 2. DB \uC5F0\uACB0 \uC124\uC815 (MariaDB)
# ------------------------------------------
# \uC8FC\uC18C \uB05D\uC5D0 ?createDatabaseIfNotExist=true \uB97C \uBD99\uC774\uBA74 \uC790\uB3D9\uC73C\uB85C DB\uB97C \uC0DD\uC131\uD574\uC90D\uB2C8\uB2E4.
spring.datasource.url=jdbc:mariadb://mariadb:3306/iksudb?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=iksu1234!

# ------------------------------------------
# [\uC218\uC815\uB41C \uBD80\uBD84] 3. JPA \uC124\uC815
# ------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=false
# \uAE30\uC874\uC758 H2Dialect \uBD80\uBD84\uC740 \uC0AD\uC81C\uD558\uAC70\uB098 \uC8FC\uC11D(#) \uCC98\uB9AC\uD558\uC138\uC694! \uC2A4\uD504\uB9C1\uC774 MariaDB\uC5D0 \uB9DE\uAC8C \uC54C\uC544\uC11C \uC124\uC815\uD569\uB2C8\uB2E4.
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ------------------------------------------
# [\uC218\uC815\uB41C \uBD80\uBD84] 4. H2 \uCF58\uC194 \uC0AC\uC6A9 (\uBE44\uD65C\uC131\uD654)
# ------------------------------------------
# \uC774\uC81C \uC2E4\uC81C DB(MariaDB)\uB97C \uC4F0\uBBC0\uB85C \uC784\uC2DC DB\uC778 H2 \uCF58\uC194\uC740 \uAEBC\uB450\uB294 \uAC83\uC774 \uBCF4\uC548\uC0C1 \uC88B\uC74C
spring.h2.console.enabled=false

# 5. Thymeleaf (\uC11C\uBC84 \uC7AC\uC2DC\uC791 \uC5C6\uC774 HTML \uBC18\uC601)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# 6. \uB85C\uAE45 \uB808\uBCA8
logging.level.org.springframework.security=INFO
logging.level.com.student.iksu=DEBUG

# 7. \uD30C\uC77C \uC5C5\uB85C\uB4DC \uC124\uC815
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# 8. \uC774\uBA54\uC77C \uC804\uC1A1 \uC124\uC815 (Google SMTP)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# \uD658\uACBD\uBCC0\uC218 \uCC98\uB9AC (\uC778\uD154\uB9AC\uC81C\uC774\uC5D0\uC11C \uAC12\uC744 \uC8FC\uC785\uBC1B\uC74C)
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT \uC124\uC815
# ${\uBCC0\uC218\uBA85} \uD615\uC2DD\uC73C\uB85C \uC791\uC131\uD558\uBA74 \uC2A4\uD504\uB9C1\uC774 \uC2E4\uD589\uB420 \uB54C OS\uB098 \uC124\uC815\uC5D0\uC11C \uAC12\uC744 \uCC3E\uC544\uC634 (\uC548\uC804\uD558\uAC8C \uC228\uAE40 \uCC98\uB9AC!)
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=86400000

# Cloudflare R2 \uC5F0\uACB0\uC6A9
cloud.aws.credentials.access-key=${R2_ACCESS_KEY}
cloud.aws.credentials.secret-key=${R2_SECRET_KEY}

cloud.aws.s3.endpoint=https://63c7fde7bf5abd92a700ee1fec5a4fda.r2.cloudflarestorage.com
cloud.aws.s3.bucket=iksu-gallery
cloud.aws.s3.public-domain=https://pub-e46b8d895f424972990014f9ba38abf5.r2.dev